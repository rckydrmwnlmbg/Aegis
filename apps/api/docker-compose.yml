version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_api_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=aegis_db
      - DB_USERNAME=aegis_user
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: ankane/pgvector:latest
    container_name: aegis_api_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=aegis_db
      - POSTGRES_USER=aegis_user
      - POSTGRES_PASSWORD=secret
    ports:
      - "5432:5432"
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data

volumes:
  aegis_pgdata:
